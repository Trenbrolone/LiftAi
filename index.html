<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiftAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:       #0e0e0e;
      --bg-2:     #161616;
      --border:   #2a2a2a;
      --text:     #e8e6e0;
      --text-dim: #7a7872;
      --accent:   #c8f135;
      --danger:   #e0524f;
      --mono:     'DM Mono', monospace;
      --sans:     'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: grid;
      grid-template-rows: 52px 44px 1fr;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* Top bar */
    #topbar {
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
    }

    #wordmark {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.5px;
    }

    #wordmark span { color: var(--accent); }

    .spacer { flex: 1; }

    #user-mark {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 4px 8px;
      letter-spacing: 1px;
    }

    /* Nav */
    #nav {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      gap: 2px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 14px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }

    .nav-btn:hover { color: var(--text); }

    .nav-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Pages */
    #content {
      overflow-y: auto;
      padding: 32px 20px;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* Home */
    .greeting {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .home-title {
      font-size: 26px;
      font-weight: 300;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
    }

    .home-title strong {
      font-weight: 500;
      color: var(--accent);
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .stat-cell {
      background: var(--bg-2);
      padding: 20px 16px;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -1px;
    }

    .stat-unit {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0;
      margin-left: 3px;
    }

    /* Workout log */
    .log-header {
      margin-bottom: 24px;
    }

    .log-title {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: -0.5px;
    }

    .log-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .exercise-block {
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .exercise-name {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .exercise-name::before {
      content: '';
      width: 4px;
      height: 16px;
      background: var(--accent);
    }

    .remove-exercise-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.1s;
    }

    .remove-exercise-btn:hover {
      color: var(--danger);
    }

    .remove-set-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      transition: color 0.1s;
    }

    .remove-set-btn:hover {
      color: var(--danger);
    }

    .set-head, .set-row {
      display: grid;
      grid-template-columns: 36px 1fr 1fr 48px 28px;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
    }

    .set-head {
      border-bottom: 1px solid var(--border);
    }

    .set-head span {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .set-head span:first-child,
    .set-row .set-num {
      text-align: center;
    }

    .set-row {
      border-bottom: 1px solid var(--border);
    }

    .set-row:last-of-type {
      border-bottom: none;
    }

    .set-num {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    .set-input {
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 6px 10px;
      width: 100%;
      text-align: center;
    }

    .set-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .check-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: transparent;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      transition: all 0.1s;
    }

    .check-btn.done {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .add-set-btn {
      width: 100%;
      padding: 10px;
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: color 0.1s;
    }

    .add-set-btn:hover {
      color: var(--accent);
    }

    /* Add exercise */
    .add-exercise-bar {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .exercise-name-input {
      flex: 1;
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 14px;
    }

    .exercise-name-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .exercise-name-input::placeholder {
      color: var(--text-dim);
    }

    .add-exercise-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      padding: 0 18px;
      cursor: pointer;
      white-space: nowrap;
    }

    .add-exercise-btn:hover {
      background: #d4ff45;
    }
  </style>
</head>
<body>
<div id="app">

  <header id="topbar">
    <div id="wordmark">LIFT<span>AI</span></div>
    <div class="spacer"></div>
    <div id="user-mark">IA</div>
  </header>

  <nav id="nav">
    <button class="nav-btn active" onclick="showPage('home', this)">HOME</button>
    <button class="nav-btn" onclick="showPage('planner', this)">AI PLANNER</button>
    <button class="nav-btn" onclick="showPage('library', this)">EXERCISES</button>
    <button class="nav-btn" onclick="showPage('log', this)">LOG</button>
    <button class="nav-btn" onclick="showPage('coach', this)">AI COACH</button>
  </nav>

  <main id="content">
    <section class="page active" id="page-home">
      <div class="greeting">Week 3 &middot; Push day</div>
      <h1 class="home-title">Good morning, <strong>Inigo.</strong></h1>
      <div class="stat-row">
        <div class="stat-cell">
          <div class="stat-label">Sessions</div>
          <div class="stat-value">2<span class="stat-unit">/ 4</span></div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Volume</div>
          <div class="stat-value">4820<span class="stat-unit">kg</span></div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Streak</div>
          <div class="stat-value">6<span class="stat-unit">days</span></div>
        </div>
      </div>
    </section>
    <section class="page" id="page-planner"></section>
    <section class="page" id="page-library"></section>
    <section class="page" id="page-log">
      <div class="log-header">
        <div class="log-title">Workout log</div>
        <div class="log-sub">Track your sets, reps and weight</div>
      </div>

      <div id="exercise-container">
        <div class="exercise-block">
          <div class="exercise-name">Bench Press<button class="remove-exercise-btn" onclick="removeExercise(this)">&times;</button></div>
          <div class="set-head">
            <span>Set</span>
            <span>Weight (kg)</span>
            <span>Reps</span>
            <span></span>
            <span></span>
          </div>
          <div class="sets-container">
            <div class="set-row">
              <div class="set-num">1</div>
              <input class="set-input" type="number" placeholder="80" oninput="saveWorkout()" />
              <input class="set-input" type="number" placeholder="8" oninput="saveWorkout()" />
              <button class="check-btn" onclick="toggleCheck(this)">&check;</button>
              <button class="remove-set-btn" onclick="removeSet(this)">&times;</button>
            </div>
          </div>
          <button class="add-set-btn" onclick="addSet(this)">+ ADD SET</button>
        </div>
      </div>

      <div class="add-exercise-bar">
        <input class="exercise-name-input" id="new-exercise-input" type="text" placeholder="Exercise name..." onkeydown="if(event.key==='Enter') addExercise()" />
        <button class="add-exercise-btn" onclick="addExercise()">+ ADD EXERCISE</button>
      </div>
    </section>
    <section class="page" id="page-coach"></section>
  </main>

</div>
<script>
  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
  }

  function toggleCheck(btn) {
    btn.classList.toggle('done');
    saveWorkout();
  }

  function setRowHTML(num, weight, reps, done) {
    return '<div class="set-num">' + num + '</div>' +
      '<input class="set-input" type="number" placeholder="80" value="' + weight + '" oninput="saveWorkout()" />' +
      '<input class="set-input" type="number" placeholder="8" value="' + reps + '" oninput="saveWorkout()" />' +
      '<button class="check-btn' + (done ? ' done' : '') + '" onclick="toggleCheck(this)">&check;</button>' +
      '<button class="remove-set-btn" onclick="removeSet(this)">&times;</button>';
  }

  function renumber(container) {
    container.querySelectorAll('.set-row').forEach((row, i) => {
      row.querySelector('.set-num').textContent = i + 1;
    });
  }

  function addSet(btn) {
    const container = btn.parentElement.querySelector('.sets-container');
    const num = container.querySelectorAll('.set-row').length + 1;
    const row = document.createElement('div');
    row.className = 'set-row';
    row.innerHTML = setRowHTML(num, '', '', false);
    container.appendChild(row);
    saveWorkout();
  }

  function removeSet(btn) {
    const container = btn.closest('.sets-container');
    btn.closest('.set-row').remove();
    renumber(container);
    saveWorkout();
  }

  function removeExercise(btn) {
    btn.closest('.exercise-block').remove();
    saveWorkout();
  }

  function addExercise() {
    const input = document.getElementById('new-exercise-input');
    const name = input.value.trim();
    if (name === '') return;
    buildExercise(name);
    input.value = '';
    saveWorkout();
  }

  function buildExercise(name) {
    const block = document.createElement('div');
    block.className = 'exercise-block';
    block.innerHTML =
      '<div class="exercise-name">' + name +
        '<button class="remove-exercise-btn" onclick="removeExercise(this)">&times;</button>' +
      '</div>' +
      '<div class="set-head">' +
        '<span>Set</span><span>Weight (kg)</span><span>Reps</span><span></span><span></span>' +
      '</div>' +
      '<div class="sets-container">' +
        '<div class="set-row">' + setRowHTML(1, '', '', false) + '</div>' +
      '</div>' +
      '<button class="add-set-btn" onclick="addSet(this)">+ ADD SET</button>';
    document.getElementById('exercise-container').appendChild(block);
    return block;
  }

  function saveWorkout() {
    const data = [];
    document.querySelectorAll('#exercise-container .exercise-block').forEach(block => {
      const name = block.querySelector('.exercise-name').childNodes[0].textContent.trim();
      const sets = [];
      block.querySelectorAll('.set-row').forEach(row => {
        const inputs = row.querySelectorAll('.set-input');
        sets.push({
          weight: inputs[0].value,
          reps: inputs[1].value,
          done: row.querySelector('.check-btn').classList.contains('done')
        });
      });
      data.push({ name: name, sets: sets });
    });
    localStorage.setItem('liftai-workout', JSON.stringify(data));
  }

  function loadWorkout() {
    const raw = localStorage.getItem('liftai-workout');
    if (!raw) return;
    const data = JSON.parse(raw);
    document.getElementById('exercise-container').innerHTML = '';
    data.forEach(ex => {
      const block = buildExercise(ex.name);
      const container = block.querySelector('.sets-container');
      container.innerHTML = '';
      ex.sets.forEach((set, i) => {
        const row = document.createElement('div');
        row.className = 'set-row';
        row.innerHTML = setRowHTML(i + 1, set.weight, set.reps, set.done);
        container.appendChild(row);
      });
    });
  }

  loadWorkout();
</script>
</body>
</html>
