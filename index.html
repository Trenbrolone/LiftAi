<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiftAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:       #0e0e0e;
      --bg-2:     #161616;
      --border:   #2a2a2a;
      --text:     #e8e6e0;
      --text-dim: #7a7872;
      --accent:   #c8f135;
      --danger:   #e0524f;
      --mono:     'DM Mono', monospace;
      --sans:     'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: grid;
      grid-template-rows: 52px 44px 1fr;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* Top bar */
    #topbar {
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
    }

    #wordmark {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.5px;
    }

    #wordmark span { color: var(--accent); }

    .spacer { flex: 1; }

    #user-mark {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 4px 8px;
      letter-spacing: 1px;
    }

    /* Nav */
    #nav {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      gap: 2px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 14px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }

    .nav-btn:hover { color: var(--text); }

    .nav-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Pages */
    #content {
      overflow-y: auto;
      padding: 32px 20px;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* Home */
    .greeting {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .home-title {
      font-size: 26px;
      font-weight: 300;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
    }

    .home-title strong {
      font-weight: 500;
      color: var(--accent);
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .stat-cell {
      background: var(--bg-2);
      padding: 20px 16px;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -1px;
    }

    .stat-unit {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0;
      margin-left: 3px;
    }

    /* Workout log */
    .log-header {
      margin-bottom: 24px;
    }

    .log-title {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: -0.5px;
    }

    .log-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .exercise-block {
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .exercise-name {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .exercise-name::before {
      content: '';
      width: 4px;
      height: 16px;
      background: var(--accent);
    }

    .remove-exercise-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.1s;
    }

    .remove-exercise-btn:hover {
      color: var(--danger);
    }

    .remove-set-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      transition: color 0.1s;
    }

    .remove-set-btn:hover {
      color: var(--danger);
    }

    .set-head, .set-row {
      display: grid;
      grid-template-columns: 36px 1fr 1fr 48px 28px;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
    }

    .set-head {
      border-bottom: 1px solid var(--border);
    }

    .set-head span {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .set-head span:first-child,
    .set-row .set-num {
      text-align: center;
    }

    .set-row {
      border-bottom: 1px solid var(--border);
    }

    .set-row:last-of-type {
      border-bottom: none;
    }

    .set-num {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    .set-input {
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 6px 10px;
      width: 100%;
      text-align: center;
    }

    .set-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .check-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: transparent;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      transition: all 0.1s;
    }

    .check-btn.done {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .add-set-btn {
      width: 100%;
      padding: 10px;
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: color 0.1s;
    }

    .add-set-btn:hover {
      color: var(--accent);
    }

    /* Add exercise */
    .add-exercise-bar {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .exercise-name-input {
      flex: 1;
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 14px;
    }

    .exercise-name-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .exercise-name-input::placeholder {
      color: var(--text-dim);
    }

    .add-exercise-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      padding: 0 18px;
      cursor: pointer;
      white-space: nowrap;
    }

    .add-exercise-btn:hover {
      background: #d4ff45;
    }

    /* Exercise library */
    .lib-header {
      margin-bottom: 20px;
    }

    .lib-title {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: -0.5px;
    }

    .lib-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .lib-search {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .lib-search:focus {
      outline: none;
      border-color: var(--accent);
    }

    .lib-search::placeholder {
      color: var(--text-dim);
    }

    .muscle-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }

    .muscle-chip {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.1s;
    }

    .muscle-chip:hover {
      color: var(--text);
    }

    .muscle-chip.active {
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
    }

    .lib-group {
      margin-bottom: 24px;
    }

    .lib-group-name {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .lib-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 4px;
      border-bottom: 1px solid var(--border);
    }

    .lib-item:last-child {
      border-bottom: none;
    }

    .lib-item-name {
      font-size: 14px;
    }

    .lib-item-equip {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .lib-empty {
      color: var(--text-dim);
      font-size: 13px;
      padding: 24px 4px;
      text-align: center;
    }
  </style>
</head>
<body>
<div id="app">

  <header id="topbar">
    <div id="wordmark">LIFT<span>AI</span></div>
    <div class="spacer"></div>
    <div id="user-mark">IA</div>
  </header>

  <nav id="nav">
    <button class="nav-btn active" onclick="showPage('home', this)">HOME</button>
    <button class="nav-btn" onclick="showPage('planner', this)">AI PLANNER</button>
    <button class="nav-btn" onclick="showPage('library', this)">EXERCISES</button>
    <button class="nav-btn" onclick="showPage('log', this)">LOG</button>
    <button class="nav-btn" onclick="showPage('coach', this)">AI COACH</button>
  </nav>

  <main id="content">
    <section class="page active" id="page-home">
      <div class="greeting">Week 3 &middot; Push day</div>
      <h1 class="home-title">Good morning, <strong>Inigo.</strong></h1>
      <div class="stat-row">
        <div class="stat-cell">
          <div class="stat-label">Sessions</div>
          <div class="stat-value">2<span class="stat-unit">/ 4</span></div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Volume</div>
          <div class="stat-value">4820<span class="stat-unit">kg</span></div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Streak</div>
          <div class="stat-value">6<span class="stat-unit">days</span></div>
        </div>
      </div>
    </section>
    <section class="page" id="page-planner"></section>
    <section class="page" id="page-library">
      <div class="lib-header">
        <div class="lib-title">Exercise library</div>
        <div class="lib-sub">Browse exercises by muscle group</div>
      </div>
      <input class="lib-search" id="lib-search" type="text" placeholder="Search exercises..." oninput="renderLibrary()" />
      <div class="muscle-filters" id="muscle-filters"></div>
      <div id="lib-list"></div>
    </section>
    <section class="page" id="page-log">
      <div class="log-header">
        <div class="log-title">Workout log</div>
        <div class="log-sub">Track your sets, reps and weight</div>
      </div>

      <div id="exercise-container">
        <div class="exercise-block">
          <div class="exercise-name">Bench Press<button class="remove-exercise-btn" onclick="removeExercise(this)">&times;</button></div>
          <div class="set-head">
            <span>Set</span>
            <span>Weight (kg)</span>
            <span>Reps</span>
            <span></span>
            <span></span>
          </div>
          <div class="sets-container">
            <div class="set-row">
              <div class="set-num">1</div>
              <input class="set-input" type="number" placeholder="80" oninput="saveWorkout()" />
              <input class="set-input" type="number" placeholder="8" oninput="saveWorkout()" />
              <button class="check-btn" onclick="toggleCheck(this)">&check;</button>
              <button class="remove-set-btn" onclick="removeSet(this)">&times;</button>
            </div>
          </div>
          <button class="add-set-btn" onclick="addSet(this)">+ ADD SET</button>
        </div>
      </div>

      <div class="add-exercise-bar">
        <input class="exercise-name-input" id="new-exercise-input" type="text" placeholder="Exercise name..." onkeydown="if(event.key==='Enter') addExercise()" />
        <button class="add-exercise-btn" onclick="addExercise()">+ ADD EXERCISE</button>
      </div>
    </section>
    <section class="page" id="page-coach"></section>
  </main>

</div>
<script>
  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
  }

  function toggleCheck(btn) {
    btn.classList.toggle('done');
    saveWorkout();
  }

  function setRowHTML(num, weight, reps, done) {
    return '<div class="set-num">' + num + '</div>' +
      '<input class="set-input" type="number" placeholder="80" value="' + weight + '" oninput="saveWorkout()" />' +
      '<input class="set-input" type="number" placeholder="8" value="' + reps + '" oninput="saveWorkout()" />' +
      '<button class="check-btn' + (done ? ' done' : '') + '" onclick="toggleCheck(this)">&check;</button>' +
      '<button class="remove-set-btn" onclick="removeSet(this)">&times;</button>';
  }

  function renumber(container) {
    container.querySelectorAll('.set-row').forEach((row, i) => {
      row.querySelector('.set-num').textContent = i + 1;
    });
  }

  function addSet(btn) {
    const container = btn.parentElement.querySelector('.sets-container');
    const num = container.querySelectorAll('.set-row').length + 1;
    const row = document.createElement('div');
    row.className = 'set-row';
    row.innerHTML = setRowHTML(num, '', '', false);
    container.appendChild(row);
    saveWorkout();
  }

  function removeSet(btn) {
    const container = btn.closest('.sets-container');
    btn.closest('.set-row').remove();
    renumber(container);
    saveWorkout();
  }

  function removeExercise(btn) {
    btn.closest('.exercise-block').remove();
    saveWorkout();
  }

  function addExercise() {
    const input = document.getElementById('new-exercise-input');
    const name = input.value.trim();
    if (name === '') return;
    buildExercise(name);
    input.value = '';
    saveWorkout();
  }

  function buildExercise(name) {
    const block = document.createElement('div');
    block.className = 'exercise-block';
    block.innerHTML =
      '<div class="exercise-name">' + name +
        '<button class="remove-exercise-btn" onclick="removeExercise(this)">&times;</button>' +
      '</div>' +
      '<div class="set-head">' +
        '<span>Set</span><span>Weight (kg)</span><span>Reps</span><span></span><span></span>' +
      '</div>' +
      '<div class="sets-container">' +
        '<div class="set-row">' + setRowHTML(1, '', '', false) + '</div>' +
      '</div>' +
      '<button class="add-set-btn" onclick="addSet(this)">+ ADD SET</button>';
    document.getElementById('exercise-container').appendChild(block);
    return block;
  }

  function saveWorkout() {
    const data = [];
    document.querySelectorAll('#exercise-container .exercise-block').forEach(block => {
      const name = block.querySelector('.exercise-name').childNodes[0].textContent.trim();
      const sets = [];
      block.querySelectorAll('.set-row').forEach(row => {
        const inputs = row.querySelectorAll('.set-input');
        sets.push({
          weight: inputs[0].value,
          reps: inputs[1].value,
          done: row.querySelector('.check-btn').classList.contains('done')
        });
      });
      data.push({ name: name, sets: sets });
    });
    localStorage.setItem('liftai-workout', JSON.stringify(data));
  }

  function loadWorkout() {
    const raw = localStorage.getItem('liftai-workout');
    if (!raw) return;
    const data = JSON.parse(raw);
    document.getElementById('exercise-container').innerHTML = '';
    data.forEach(ex => {
      const block = buildExercise(ex.name);
      const container = block.querySelector('.sets-container');
      container.innerHTML = '';
      ex.sets.forEach((set, i) => {
        const row = document.createElement('div');
        row.className = 'set-row';
        row.innerHTML = setRowHTML(i + 1, set.weight, set.reps, set.done);
        container.appendChild(row);
      });
    });
  }

  const EXERCISES = [
    {"name":"Barbell Bench Press - Medium Grip","muscle":"Chest","equip":"Barbell","img":"Barbell_Bench_Press_-_Medium_Grip.jpg","desc":"Lie back on a flat bench. Using a medium width grip (a grip that creates a 90-degree angle in the middle of the movement between the forearms and the upper arms), lift the bar from the rack and hold it straight over you with your arms locked. This will be your starting position. From the starting position, breathe in and begin coming down slowly until the bar touches your middle chest. After a brief pause, push the bar back to the starting position as you breathe out. Focus on pushing the bar using your chest muscles. Lock your arms and squeeze your chest in the contracted position at the top of the motion, hold for a second and then start coming down slowly again. Tip: Ideally, lowering the weight should take about twice as long as raising it. Repeat the movement for the prescribed amount of repetitions. When you are done, place the bar back in the rack."},
    {"name":"Dumbbell Bench Press","muscle":"Chest","equip":"Dumbbell","img":"Dumbbell_Bench_Press.jpg","desc":"Lie down on a flat bench with a dumbbell in each hand resting on top of your thighs. The palms of your hands will be facing each other. Then, using your thighs to help raise the dumbbells up, lift the dumbbells one at a time so that you can hold them in front of you at shoulder width. Once at shoulder width, rotate your wrists forward so that the palms of your hands are facing away from you. The dumbbells should be just to the sides of your chest, with your upper arm and forearm creating a 90 degree angle. Be sure to maintain full control of the dumbbells at all times. This will be your starting position. Then, as you breathe out, use your chest to push the dumbbells up. Lock your arms at the top of the lift and squeeze your chest, hold for a second and then begin coming down slowly. Tip: Ideally, lowering the weight should take about twice as long as raising it. Repeat the movement for the prescribed amount of repetitions of your training program."},
    {"name":"Barbell Incline Bench Press - Medium Grip","muscle":"Chest","equip":"Barbell","img":"Barbell_Incline_Bench_Press_-_Medium_Grip.jpg","desc":"Lie back on an incline bench. Using a medium-width grip (a grip that creates a 90-degree angle in the middle of the movement between the forearms and the upper arms), lift the bar from the rack and hold it straight over you with your arms locked. This will be your starting position. As you breathe in, come down slowly until you feel the bar on you upper chest. After a second pause, bring the bar back to the starting position as you breathe out and push the bar using your chest muscles. Lock your arms in the contracted position, squeeze your chest, hold for a second and then start coming down slowly again. Tip: it should take at least twice as long to go down than to come up. Repeat the movement for the prescribed amount of repetitions. When you are done, place the bar back in the rack."},
    {"name":"Incline Dumbbell Press","muscle":"Chest","equip":"Dumbbell","img":"Incline_Dumbbell_Press.jpg","desc":"Lie back on an incline bench with a dumbbell in each hand atop your thighs. The palms of your hands will be facing each other. Then, using your thighs to help push the dumbbells up, lift the dumbbells one at a time so that you can hold them at shoulder width. Once you have the dumbbells raised to shoulder width, rotate your wrists forward so that the palms of your hands are facing away from you. This will be your starting position. Be sure to keep full control of the dumbbells at all times. Then breathe out and push the dumbbells up with your chest. Lock your arms at the top, hold for a second, and then start slowly lowering the weight. Tip Ideally, lowering the weights should take about twice as long as raising them. Repeat the movement for the prescribed amount of repetitions. When you are done, place the dumbbells back on your thighs and then on the floor. This is the safest manner to release the dumbbells."},
    {"name":"Decline Barbell Bench Press","muscle":"Chest","equip":"Barbell","img":"Decline_Barbell_Bench_Press.jpg","desc":"Secure your legs at the end of the decline bench and slowly lay down on the bench. Using a medium width grip (a grip that creates a 90-degree angle in the middle of the movement between the forearms and the upper arms), lift the bar from the rack and hold it straight over you with your arms locked. The arms should be perpendicular to the floor. This will be your starting position. Tip: In order to protect your rotator cuff, it is best if you have a spotter help you lift the barbell off the rack. As you breathe in, come down slowly until you feel the bar on your lower chest. After a second pause, bring the bar back to the starting position as you breathe out and push the bar using your chest muscles. Lock your arms and squeeze your chest in the contracted position, hold for a second and then start coming down slowly again. Tip: It should take at least twice as long to go down than to come up). Repeat the movement for the prescribed amount of repetitions. When you are done, place the bar back in the rack."},
    {"name":"Dumbbell Flyes","muscle":"Chest","equip":"Dumbbell","img":"Dumbbell_Flyes.jpg","desc":"Lie down on a flat bench with a dumbbell on each hand resting on top of your thighs. The palms of your hand will be facing each other. Then using your thighs to help raise the dumbbells, lift the dumbbells one at a time so you can hold them in front of you at shoulder width with the palms of your hands facing each other. Raise the dumbbells up like you\u0027re pressing them, but stop and hold just before you lock out. This will be your starting position. With a slight bend on your elbows in order to prevent stress at the biceps tendon, lower your arms out at both sides in a wide arc until you feel a stretch on your chest. Breathe in as you perform this portion of the movement. Tip: Keep in mind that throughout the movement, the arms should remain stationary; the movement should only occur at the shoulder joint. Return your arms back to the starting position as you squeeze your chest muscles and breathe out. Tip: Make sure to use the same arc of motion used to lower the weights. Hold for a second at the contracted position and repeat the movement for the prescribed amount of repetitions."},
    {"name":"Cable Crossover","muscle":"Chest","equip":"Cable","img":"Cable_Crossover.jpg","desc":"To get yourself into the starting position, place the pulleys on a high position (above your head), select the resistance to be used and hold the pulleys in each hand. Step forward in front of an imaginary straight line between both pulleys while pulling your arms together in front of you. Your torso should have a small forward bend from the waist. This will be your starting position. With a slight bend on your elbows in order to prevent stress at the biceps tendon, extend your arms to the side (straight out at both sides) in a wide arc until you feel a stretch on your chest. Breathe in as you perform this portion of the movement. Tip: Keep in mind that throughout the movement, the arms and torso should remain stationary; the movement should only occur at the shoulder joint. Return your arms back to the starting position as you breathe out. Make sure to use the same arc of motion used to lower the weights. Hold for a second at the starting position and repeat the movement for the prescribed amount of repetitions."},
    {"name":"Pushups","muscle":"Chest","equip":"Bodyweight","img":"Pushups.jpg","desc":"Lie on the floor face down and place your hands about 36 inches apart while holding your torso up at arms length. Next, lower yourself downward until your chest almost touches the floor as you inhale. Now breathe out and press your upper body back up to the starting position while squeezing your chest. After a brief pause at the top contracted position, you can begin to lower yourself downward again for as many repetitions as needed."},
    {"name":"Dips - Chest Version","muscle":"Chest","equip":"Other","img":"Dips_-_Chest_Version.jpg","desc":"For this exercise you will need access to parallel bars. To get yourself into the starting position, hold your body at arms length (arms locked) above the bars. While breathing in, lower yourself slowly with your torso leaning forward around 30 degrees or so and your elbows flared out slightly until you feel a slight stretch in the chest. Once you feel the stretch, use your chest to bring your body back to the starting position as you breathe out. Tip: Remember to squeeze the chest at the top of the movement for a second. Repeat the movement for the prescribed amount of repetitions."},
    {"name":"Machine Bench Press","muscle":"Chest","equip":"Machine","img":"Machine_Bench_Press.jpg","desc":"Sit down on the Chest Press Machine and select the weight. Step on the lever provided by the machine since it will help you to bring the handles forward so that you can grab the handles and fully extend the arms. Grab the handles with a palms-down grip and lift your elbows so that your upper arms are parallel to the floor to the sides of your torso. Tip: Your forearms will be pointing forward since you are grabbing the handles. Once you bring the handles forward and extend the arms you will be at the starting position. Now bring the handles back towards you as you breathe in. Push the handles away from you as you flex your pecs and you breathe out. Hold the contraction for a second before going back to the starting position. Repeat for the recommended amount of reps. When finished step on the lever again and slowly get the handles back to their original place."},
    {"name":"Incline Dumbbell Flyes","muscle":"Chest","equip":"Dumbbell","img":"Incline_Dumbbell_Flyes.jpg","desc":"Hold a dumbbell on each hand and lie on an incline bench that is set to an incline angle of no more than 30 degrees. Extend your arms above you with a slight bend at the elbows. Now rotate the wrists so that the palms of your hands are facing you. Tip: The pinky fingers should be next to each other. This will be your starting position. As you breathe in, start to slowly lower the arms to the side while keeping the arms extended and while rotating the wrists until the palms of the hand are facing each other. Tip: At the end of the movement the arms will be by your side with the palms facing the ceiling. As you exhale start to bring the dumbbells back up to the starting position by reversing the motion and rotating the hands so that the pinky fingers are next to each other again. Tip: Keep in mind that the movement will only happen at the shoulder joint and at the wrist. There is no motion that happens at the elbow joint. Repeat for the recommended amount of repetitions."},
    {"name":"Alternating Floor Press","muscle":"Chest","equip":"Kettlebell","img":"Alternating_Floor_Press.jpg","desc":"Lie on the floor with two kettlebells next to your shoulders. Position one in place on your chest and then the other, gripping the kettlebells on the handle with the palms facing forward. Extend both arms, so that the kettlebells are being held above your chest. Lower one kettlebell, bringing it to your chest and turn the wrist in the direction of the locked out kettlebell. Raise the kettlebell and repeat on the opposite side."},
    {"name":"Bench Press - With Bands","muscle":"Chest","equip":"Bands","img":"Bench_Press_-_With_Bands.jpg","desc":"Using a flat bench secure a band under the leg of the bench that is nearest to your head. Once the band is secure, grab it by both handles and lie down on the bench. Extend your arms so that you are holding the band handles in front of you at shoulder width. Once at shoulder width, rotate your wrists forward so that the palms of your hands are facing away from you. This will be your starting position. Bring down the handles slowly until your elbow forms a 90 degree angle. Keep full control at all times. As you breathe out, bring the handles up using your pectoral muscles. Lock your arms in the contracted position, squeeze your chest, hold for a second and then start coming down slowly. Tip: It should take at least twice as long to go down than to come up. Repeat the movement for the prescribed amount of repetitions of your training program."},
    {"name":"Butterfly","muscle":"Chest","equip":"Machine","img":"Butterfly.jpg","desc":"Sit on the machine with your back flat on the pad. Take hold of the handles. Tip: Your upper arms should be positioned parallel to the floor; adjust the machine accordingly. This will be your starting position. Push the handles together slowly as you squeeze your chest in the middle. Breathe out during this part of the motion and hold the contraction for a second. Return back to the starting position slowly as you inhale until your chest muscles are fully stretched. Repeat for the recommended amount of repetitions."},
    {"name":"Cable Chest Press","muscle":"Chest","equip":"Cable","img":"Cable_Chest_Press.jpg","desc":"Adjust the weight to an appropriate amount and be seated, grasping the handles. Your upper arms should be about 45 degrees to the body, with your head and chest up. The elbows should be bent to about 90 degrees. This will be your starting position. Begin by extending through the elbow, pressing the handles together straight in front of you. Keep your shoulder blades retracted as you execute the movement. After pausing at full extension, return to th starting position, keeping tension on the cables. You can also execute this movement with your back off the pad, at an incline or decline, or alternate hands."},
    {"name":"Cable Iron Cross","muscle":"Chest","equip":"Cable","img":"Cable_Iron_Cross.jpg","desc":"Begin by moving the pulleys to the high position, select the resistance to be used, and take a handle in each hand. Stand directly between both pulleys with your arms extended out to your sides. Your head and chest should be up while your arms form a \"T\". This will be your starting position. Keeping the elbows extended, pull your arms straight to your sides. Return your arms back to the starting position after a pause at the peak contraction. Continue the movement for the prescribed number of repetitions."},
    {"name":"Cross Over - With Bands","muscle":"Chest","equip":"Bands","img":"Cross_Over_-_With_Bands.jpg","desc":"Secure an exercise band around a stationary post. While facing away from the post, grab the handles on both ends of the band and step forward enough to create tension on the band. Raise your arms to the sides, parallel to the floor, perpendicular to your torso (your torso and the arms should resemble the letter \"T\") and with the palms facing forward. Have them extended with a slight bend at the elbows. This will be your starting position. While keeping your arms straight, bring them across your chest in a semicircular motion to the front as you exhale and flex your pecs. Hold the contraction for a second. Slowly return to the starting position as you inhale. Perform for the recommended amount of repetitions."},
    {"name":"Decline Dumbbell Bench Press","muscle":"Chest","equip":"Dumbbell","img":"Decline_Dumbbell_Bench_Press.jpg","desc":"Secure your legs at the end of the decline bench and lie down with a dumbbell on each hand on top of your thighs. The palms of your hand will be facing each other. Once you are laying down, move the dumbbells in front of you at shoulder width. Once at shoulder width, rotate your wrists forward so that the palms of your hands are facing away from you. This will be your starting position. Bring down the weights slowly to your side as you breathe out. Keep full control of the dumbbells at all times. Tip: Throughout the motion, the forearms should always be perpendicular to the floor. As you breathe out, push the dumbbells up using your pectoral muscles. Lock your arms in the contracted position, squeeze your chest, hold for a second and then start coming down slowly. Tip: It should take at least twice as long to go down than to come up.. Repeat the movement for the prescribed amount of repetitions of your training program."},
    {"name":"Decline Dumbbell Flyes","muscle":"Chest","equip":"Dumbbell","img":"Decline_Dumbbell_Flyes.jpg","desc":"Secure your legs at the end of the decline bench and lie down with a dumbbell on each hand on top of your thighs. The palms of your hand will be facing each other. Once you are laying down, move the dumbbells in front of you at shoulder width. The palms of the hands should be facing each other and the arms should be perpendicular to the floor and fully extended. This will be your starting position. With a slight bend on your elbows in order to prevent stress at the biceps tendon, lower your arms out at both sides in a wide arc until you feel a stretch on your chest. Breathe in as you perform this portion of the movement. Tip: Keep in mind that throughout the movement, the arms should remain stationary; the movement should only occur at the shoulder joint. Return your arms back to the starting position as you squeeze your chest muscles and breathe out. Tip: Make sure to use the same arc of motion used to lower the weights. Hold for a second at the contracted position and repeat the movement for the prescribed amount of repetitions."},
    {"name":"Barbell Deadlift","muscle":"Back","equip":"Barbell","img":"Barbell_Deadlift.jpg","desc":"Stand in front of a loaded barbell. While keeping the back as straight as possible, bend your knees, bend forward and grasp the bar using a medium (shoulder width) overhand grip. This will be the starting position of the exercise. Tip: If it is difficult to hold on to the bar with this grip, alternate your grip or use wrist straps. While holding the bar, start the lift by pushing with your legs while simultaneously getting your torso to the upright position as you breathe out. In the upright position, stick your chest out and contract the back by bringing the shoulder blades back. Think of how the soldiers in the military look when they are in standing in attention. Go back to the starting position by bending at the knees while simultaneously leaning the torso forward at the waist while keeping the back straight. When the weights on the bar touch the floor you are back at the starting position and ready to perform another repetition. Perform the amount of repetitions prescribed in the program."},
    {"name":"Pullups","muscle":"Back","equip":"Bodyweight","img":"Pullups.jpg","desc":"Grab the pull-up bar with the palms facing forward using the prescribed grip. Note on grips: For a wide grip, your hands need to be spaced out at a distance wider than your shoulder width. For a medium grip, your hands need to be spaced out at a distance equal to your shoulder width and for a close grip at a distance smaller than your shoulder width. As you have both arms extended in front of you holding the bar at the chosen grip width, bring your torso back around 30 degrees or so while creating a curvature on your lower back and sticking your chest out. This is your starting position. Pull your torso up until the bar touches your upper chest by drawing the shoulders and the upper arms down and back. Exhale as you perform this portion of the movement. Tip: Concentrate on squeezing the back muscles once you reach the full contracted position. The upper torso should remain stationary as it moves through space and only the arms should move. The forearms should do no other work other than hold the bar. After a second on the contracted position, start to inhale and slowly lower your torso back to the starting position when your arms are fully extended and the lats are fully stretched. Repeat this motion for the prescribed amount of repetitions."},
    {"name":"Chin-Up","muscle":"Back","equip":"Bodyweight","img":"Chin-Up.jpg","desc":"Grab the pull-up bar with the palms facing your torso and a grip closer than the shoulder width. As you have both arms extended in front of you holding the bar at the chosen grip width, keep your torso as straight as possible while creating a curvature on your lower back and sticking your chest out. This is your starting position. Tip: Keeping the torso as straight as possible maximizes biceps stimulation while minimizing back involvement. As you breathe out, pull your torso up until your head is around the level of the pull-up bar. Concentrate on using the biceps muscles in order to perform the movement. Keep the elbows close to your body. Tip: The upper torso should remain stationary as it moves through space and only the arms should move. The forearms should do no other work other than hold the bar. After a second of squeezing the biceps in the contracted position, slowly lower your torso back to the starting position; when your arms are fully extended. Breathe in as you perform this portion of the movement. Repeat this motion for the prescribed amount of repetitions."},
    {"name":"Bent Over Barbell Row","muscle":"Back","equip":"Barbell","img":"Bent_Over_Barbell_Row.jpg","desc":"Holding a barbell with a pronated grip (palms facing down), bend your knees slightly and bring your torso forward, by bending at the waist, while keeping the back straight until it is almost parallel to the floor. Tip: Make sure that you keep the head up. The barbell should hang directly in front of you as your arms hang perpendicular to the floor and your torso. This is your starting position. Now, while keeping the torso stationary, breathe out and lift the barbell to you. Keep the elbows close to the body and only use the forearms to hold the weight. At the top contracted position, squeeze the back muscles and hold for a brief pause. Then inhale and slowly lower the barbell back to the starting position. Repeat for the recommended amount of repetitions."},
    {"name":"Wide-Grip Lat Pulldown","muscle":"Back","equip":"Cable","img":"Wide-Grip_Lat_Pulldown.jpg","desc":"Sit down on a pull-down machine with a wide bar attached to the top pulley. Make sure that you adjust the knee pad of the machine to fit your height. These pads will prevent your body from being raised by the resistance attached to the bar. Grab the bar with the palms facing forward using the prescribed grip. Note on grips: For a wide grip, your hands need to be spaced out at a distance wider than shoulder width. For a medium grip, your hands need to be spaced out at a distance equal to your shoulder width and for a close grip at a distance smaller than your shoulder width. As you have both arms extended in front of you holding the bar at the chosen grip width, bring your torso back around 30 degrees or so while creating a curvature on your lower back and sticking your chest out. This is your starting position. As you breathe out, bring the bar down until it touches your upper chest by drawing the shoulders and the upper arms down and back. Tip: Concentrate on squeezing the back muscles once you reach the full contracted position. The upper torso should remain stationary and only the arms should move. The forearms should do no other work except for holding the bar; therefore do not try to pull down the bar using the forearms. After a second at the contracted position squeezing your shoulder blades together, slowly raise the bar back to the starting position when your arms are fully extended and the lats are fully stretched. Inhale during this portion of the movement. Repeat this motion for the prescribed amount of repetitions."},
    {"name":"Close-Grip Front Lat Pulldown","muscle":"Back","equip":"Cable","img":"Close-Grip_Front_Lat_Pulldown.jpg","desc":"Sit down on a pull-down machine with a wide bar attached to the top pulley. Make sure that you adjust the knee pad of the machine to fit your height. These pads will prevent your body from being raised by the resistance attached to the bar. Grab the bar with the palms facing forward using the prescribed grip. Note on grips: For a wide grip, your hands need to be spaced out at a distance wider than your shoulder width. For a medium grip, your hands need to be spaced out at a distance equal to your shoulder width and for a close grip at a distance smaller than your shoulder width. As you have both arms extended in front of you - while holding the bar at the chosen grip width - bring your torso back around 30 degrees or so while creating a curvature on your lower back and sticking your chest out. This is your starting position. As you breathe out, bring the bar down until it touches your upper chest by drawing the shoulders and the upper arms down and back. Tip: Concentrate on squeezing the back muscles once you reach the full contracted position. The upper torso should remain stationary (only the arms should move). The forearms should do no other work except for holding the bar; therefore do not try to pull the bar down using the forearms. After a second in the contracted position, while squeezing your shoulder blades together, slowly raise the bar back to the starting position when your arms are fully extended and the lats are fully stretched. Inhale during this portion of the movement. 6. Repeat this motion for the prescribed amount of repetitions."},
    {"name":"Seated Cable Rows","muscle":"Back","equip":"Cable","img":"Seated_Cable_Rows.jpg","desc":"For this exercise you will need access to a low pulley row machine with a V-bar. Note: The V-bar will enable you to have a neutral grip where the palms of your hands face each other. To get into the starting position, first sit down on the machine and place your feet on the front platform or crossbar provided making sure that your knees are slightly bent and not locked. Lean over as you keep the natural alignment of your back and grab the V-bar handles. With your arms extended pull back until your torso is at a 90-degree angle from your legs. Your back should be slightly arched and your chest should be sticking out. You should be feeling a nice stretch on your lats as you hold the bar in front of you. This is the starting position of the exercise. Keeping the torso stationary, pull the handles back towards your torso while keeping the arms close to it until you touch the abdominals. Breathe out as you perform that movement. At that point you should be squeezing your back muscles hard. Hold that contraction for a second and slowly go back to the original position while breathing in. Repeat for the recommended amount of repetitions."},
    {"name":"Bent Over Two-Dumbbell Row","muscle":"Back","equip":"Dumbbell","img":"Bent_Over_Two-Dumbbell_Row.jpg","desc":"With a dumbbell in each hand (palms facing your torso), bend your knees slightly and bring your torso forward by bending at the waist; as you bend make sure to keep your back straight until it is almost parallel to the floor. Tip: Make sure that you keep the head up. The weights should hang directly in front of you as your arms hang perpendicular to the floor and your torso. This is your starting position. While keeping the torso stationary, lift the dumbbells to your side (as you breathe out), keeping the elbows close to the body (do not exert any force with the forearm other than holding the weights). On the top contracted position, squeeze the back muscles and hold for a second. Slowly lower the weight again to the starting position as you inhale. Repeat for the recommended amount of repetitions."},
    {"name":"T-Bar Row with Handle","muscle":"Back","equip":"Barbell","img":"T-Bar_Row_with_Handle.jpg","desc":"Position a bar into a landmine or in a corner to keep it from moving. Load an appropriate weight onto your end. Stand over the bar, and position a Double D row handle around the bar next to the collar. Using your hips and legs, rise to a standing position. Assume a wide stance with your hips back and your chest up. Your arms should be extended. This will be your starting position. Pull the weight to your upper abdomen by retracting the shoulder blades and flexing the elbows. Do not jerk the weight or cheat during the movement. After a brief pause, return to the starting position."},
    {"name":"Barbell Shrug","muscle":"Back","equip":"Barbell","img":"Barbell_Shrug.jpg","desc":"Stand up straight with your feet at shoulder width as you hold a barbell with both hands in front of you using a pronated grip (palms facing the thighs). Tip: Your hands should be a little wider than shoulder width apart. You can use wrist wraps for this exercise for a better grip. This will be your starting position. Raise your shoulders up as far as you can go as you breathe out and hold the contraction for a second. Tip: Refrain from trying to lift the barbell by using your biceps. Slowly return to the starting position as you breathe in. Repeat for the recommended amount of repetitions."},
    {"name":"Hyperextensions (Back Extensions)","muscle":"Back","equip":"Other","img":"Hyperextensions_Back_Extensions.jpg","desc":"Lie face down on a hyperextension bench, tucking your ankles securely under the footpads. Adjust the upper pad if possible so your upper thighs lie flat across the wide pad, leaving enough room for you to bend at the waist without any restriction. With your body straight, cross your arms in front of you (my preference) or behind your head. This will be your starting position. Tip: You can also hold a weight plate for extra resistance in front of you under your crossed arms. Start bending forward slowly at the waist as far as you can while keeping your back flat. Inhale as you perform this movement. Keep moving forward until you feel a nice stretch on the hamstrings and you can no longer keep going without a rounding of the back. Tip: Never round the back as you perform this exercise. Also, some people can go farther than others. The key thing is that you go as far as your body allows you to without rounding the back. Slowly raise your torso back to the initial position as you inhale. Tip: Avoid the temptation to arch your back past a straight line. Also, do not swing the torso at any time in order to protect the back from injury. Repeat for the recommended amount of repetitions."},
    {"name":"One-Arm Dumbbell Row","muscle":"Back","equip":"Dumbbell","img":"One-Arm_Dumbbell_Row.jpg","desc":"Choose a flat bench and place a dumbbell on each side of it. Place the right leg on top of the end of the bench, bend your torso forward from the waist until your upper body is parallel to the floor, and place your right hand on the other end of the bench for support. Use the left hand to pick up the dumbbell on the floor and hold the weight while keeping your lower back straight. The palm of the hand should be facing your torso. This will be your starting position. Pull the resistance straight up to the side of your chest, keeping your upper arm close to your side and keeping the torso stationary. Breathe out as you perform this step. Tip: Concentrate on squeezing the back muscles once you reach the full contracted position. Also, make sure that the force is performed with the back muscles and not the arms. Finally, the upper torso should remain stationary and only the arms should move. The forearms should do no other work except for holding the dumbbell; therefore do not try to pull the dumbbell up using the forearms. Lower the resistance straight down to the starting position. Breathe in as you perform this step. Repeat the movement for the specified amount of repetitions. Switch sides and repeat again with the other arm."},
    {"name":"Band Assisted Pull-Up","muscle":"Back","equip":"Other","img":"Band_Assisted_Pull-Up.jpg","desc":"Choke the band around the center of the pullup bar. You can use different bands to provide varying levels of assistance. Pull the end of the band down, and place one bent knee into the loop, ensuring it won\u0027t slip out. Take a medium to wide grip on the bar. This will be your starting position. Pull yourself upward by contracting the lats as you flex the elbow. The elbow should be driven to your side. Pull to the front, attempting to get your chin over the bar. Avoid swinging or jerking movements. After a brief pause, return to the starting position."},
    {"name":"Barbell Shrug Behind The Back","muscle":"Back","equip":"Barbell","img":"Barbell_Shrug_Behind_The_Back.jpg","desc":"Stand up straight with your feet at shoulder width as you hold a barbell with both hands behind your back using a pronated grip (palms facing back). Tip: Your hands should be a little wider than shoulder width apart. You can use wrist wraps for this exercise for better grip. This will be your starting position. Raise your shoulders up as far as you can go as you breathe out and hold the contraction for a second. Tip: Refrain from trying to lift the barbell by using your biceps. The arms should remain stretched out at all times. Slowly return to the starting position as you breathe in. Repeat for the recommended amount of repetitions."},
    {"name":"Bent Over One-Arm Long Bar Row","muscle":"Back","equip":"Barbell","img":"Bent_Over_One-Arm_Long_Bar_Row.jpg","desc":"Put weight on one of the ends of an Olympic barbell. Make sure that you either place the other end of the barbell in the corner of two walls; or put a heavy object on the ground so the barbell cannot slide backward. Bend forward until your torso is as close to parallel with the floor as you can and keep your knees slightly bent. Now grab the bar with one arm just behind the plates on the side where the weight was placed and put your other hand on your knee. This will be your starting position. Pull the bar straight up with your elbow in (to maximize back stimulation) until the plates touch your lower chest. Squeeze the back muscles as you lift the weight up and hold for a second at the top of the movement. Breathe out as you lift the weight. Tip: Do not allow for any swinging of the torso. Only the arm should move. Slowly lower the bar to the starting position getting a nice stretch on the lats. Tip: Do not let the plates touch the floor. To ensure the best range of motion, I recommend using small plates (25-lb ones) as opposed to larger plates (like 35-45lb ones). Repeat for the recommended amount of repetitions and switch arms."},
    {"name":"Bent Over Two-Dumbbell Row With Palms In","muscle":"Back","equip":"Dumbbell","img":"Bent_Over_Two-Dumbbell_Row_With_Palms_In.jpg","desc":"With a dumbbell in each hand (palms facing each other), bend your knees slightly and bring your torso forward, by bending at the waist, while keeping the back straight until it is almost parallel to the floor. Tip: Make sure that you keep the head up. The weights should hang directly in front of you as your arms hang perpendicular to the floor and your torso. This is your starting position. While keeping the torso stationary, lift the dumbbells to your side as you breathe out, squeezing your shoulder blades together. On the top contracted position, squeeze the back muscles and hold for a second. Slowly lower the weight again to the starting position as you inhale. Repeat for the recommended amount of repetitions."},
    {"name":"Cable Incline Pushdown","muscle":"Back","equip":"Cable","img":"Cable_Incline_Pushdown.jpg","desc":"Lie on incline an bench facing away from a high pulley machine that has a straight bar attachment on it. Grasp the straight bar attachment overhead with a pronated (overhand; palms down) shoulder width grip and extend your arms in front of you. The bar should be around 2 inches away from your upper thighs. This will be your starting position. Keeping the upper arms stationary, lift your arms back in a semi circle until the bar is straight over your head. Breathe in during this portion of the movement. Slowly go back to the starting position using your lats and hold the contraction once you reach the starting position. Breathe out during the execution of this movement. Repeat for the recommended amount of repetitions."},
    {"name":"Cable Shrugs","muscle":"Back","equip":"Cable","img":"Cable_Shrugs.jpg","desc":"Grasp a cable bar attachment that is attached to a low pulley with a shoulder width or slightly wider overhand (palms facing down) grip. Stand erect close to the pulley with your arms extended in front of you holding the bar. This will be your starting position. Lift the bar by elevating the shoulders as high as possible as you exhale. Hold the contraction at the top for a second. Tip: The arms should remain extended at all times. Refrain from using the biceps to help lift the bar. Only the shoulders should be moving up and down. Lower the bar back to the original position. Repeat for the recommended amount of repetitions."},
    {"name":"Calf-Machine Shoulder Shrug","muscle":"Back","equip":"Machine","img":"Calf-Machine_Shoulder_Shrug.jpg","desc":"Position yourself on the calf machine so that the shoulder pads are above your shoulders. Your torso should be straight with the arms extended normally by your side. This will be your starting position. Raise your shoulders up towards your ears as you exhale and hold the contraction for a full second. Slowly return to the starting position as you inhale. Repeat for the recommended amount of repetitions."},
    {"name":"Barbell Squat","muscle":"Legs","equip":"Barbell","img":"Barbell_Squat.jpg","desc":"This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack to just below shoulder level. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it. Hold on to the bar using both arms at each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso. Step away from the rack and position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times and also maintain a straight back. This will be your starting position. (Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances discussed in the foot stances section). Begin to slowly lower the bar by bending the knees and hips as you maintain a straight posture with the head up. Continue down until the angle between the upper leg and the calves becomes slightly less than 90-degrees. Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly. Begin to raise the bar as you exhale by pushing the floor with the heel of your foot as you straighten the legs again and go back to the starting position. Repeat for the recommended amount of repetitions."},
    {"name":"Barbell Full Squat","muscle":"Legs","equip":"Barbell","img":"Barbell_Full_Squat.jpg","desc":"This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack just above shoulder level. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it. Hold on to the bar using both arms at each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso. Step away from the rack and position your legs using a shoulder-width medium stance with the toes slightly pointed out. Keep your head up at all times and maintain a straight back. This will be your starting position. Begin to slowly lower the bar by bending the knees and sitting back with your hips as you maintain a straight posture with the head up. Continue down until your hamstrings are on your calves. Inhale as you perform this portion of the movement. Begin to raise the bar as you exhale by pushing the floor with the heel or middle of your foot as you straighten the legs and extend the hips to go back to the starting position. Repeat for the recommended amount of repetitions."},
    {"name":"Front Barbell Squat","muscle":"Legs","equip":"Barbell","img":"Front_Barbell_Squat.jpg","desc":"This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack that best matches your height. Once the correct height is chosen and the bar is loaded, bring your arms up under the bar while keeping the elbows high and the upper arm slightly above parallel to the floor. Rest the bar on top of the deltoids and cross your arms while grasping the bar for total control. Lift the bar off the rack by first pushing with your legs and at the same time straightening your torso. Step away from the rack and position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times as looking down will get you off balance and also maintain a straight back. This will be your starting position. (Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances described in the foot positioning section). Begin to slowly lower the bar by bending the knees as you maintain a straight posture with the head up. Continue down until the angle between the upper leg and the calves becomes slightly less than 90-degrees (which is the point in which the upper legs are below parallel to the floor). Inhale as you perform this portion of the movement. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly. Begin to raise the bar as you exhale by pushing the floor mainly with the middle of your foot as you straighten the legs again and go back to the starting position. Repeat for the recommended amount of repetitions."},
    {"name":"Leg Press","muscle":"Legs","equip":"Machine","img":"Leg_Press.jpg","desc":"Using a leg press machine, sit down on the machine and place your legs on the platform directly in front of you at a medium (shoulder width) foot stance. (Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances described in the foot positioning section). Lower the safety bars holding the weighted platform in place and press the platform all the way up until your legs are fully extended in front of you. Tip: Make sure that you do not lock your knees. Your torso and the legs should make a perfect 90-degree angle. This will be your starting position. As you inhale, slowly lower the platform until your upper and lower legs make a 90-degree angle. Pushing mainly with the heels of your feet and using the quadriceps go back to the starting position as you exhale. Repeat for the recommended amount of repetitions and ensure to lock the safety pins properly once you are done. You do not want that platform falling on you fully loaded."},
    {"name":"Romanian Deadlift","muscle":"Legs","equip":"Barbell","img":"Romanian_Deadlift.jpg","desc":"Put a barbell in front of you on the ground and grab it using a pronated (palms facing down) grip that a little wider than shoulder width. Tip: Depending on the weight used, you may need wrist wraps to perform the exercise and also a raised platform in order to allow for better range of motion. Bend the knees slightly and keep the shins vertical, hips back and back straight. This will be your starting position. Keeping your back and arms completely straight at all times, use your hips to lift the bar as you exhale. Tip: The movement should not be fast but steady and under control. Once you are standing completely straight up, lower the bar by pushing the hips back, only slightly bending the knees, unlike when squatting. Tip: Take a deep breath at the start of the movement and keep your chest up. Hold your breath as you lower and exhale as you complete the movement. Repeat for the recommended amount of repetitions."},
    {"name":"Leg Extensions","muscle":"Legs","equip":"Machine","img":"Leg_Extensions.jpg","desc":"For this exercise you will need to use a leg extension machine. First choose your weight and sit on the machine with your legs under the pad (feet pointed forward) and the hands holding the side bars. This will be your starting position. Tip: You will need to adjust the pad so that it falls on top of your lower leg (just above your feet). Also, make sure that your legs form a 90-degree angle between the lower and upper leg. If the angle is less than 90-degrees then that means the knee is over the toes which in turn creates undue stress at the knee joint. If the machine is designed that way, either look for another machine or just make sure that when you start executing the exercise you stop going down once you hit the 90-degree angle. Using your quadriceps, extend your legs to the maximum as you exhale. Ensure that the rest of the body remains stationary on the seat. Pause a second on the contracted position. Slowly lower the weight back to the original position as you inhale, ensuring that you do not go past the 90-degree angle limit. Repeat for the recommended amount of times."},
    {"name":"Lying Leg Curls","muscle":"Legs","equip":"Machine","img":"Lying_Leg_Curls.jpg","desc":"Adjust the machine lever to fit your height and lie face down on the leg curl machine with the pad of the lever on the back of your legs (just a few inches under the calves). Tip: Preferably use a leg curl machine that is angled as opposed to flat since an angled position is more favorable for hamstrings recruitment. Keeping the torso flat on the bench, ensure your legs are fully stretched and grab the side handles of the machine. Position your toes straight (or you can also use any of the other two stances described on the foot positioning section). This will be your starting position. As you exhale, curl your legs up as far as possible without lifting the upper legs from the pad. Once you hit the fully contracted position, hold it for a second. As you inhale, bring the legs back to the initial position. Repeat for the recommended amount of repetitions."},
    {"name":"Dumbbell Lunges","muscle":"Legs","equip":"Dumbbell","img":"Dumbbell_Lunges.jpg","desc":"Stand with your torso upright holding two dumbbells in your hands by your sides. This will be your starting position. Step forward with your right leg around 2 feet or so from the foot being left stationary behind and lower your upper body down, while keeping the torso upright and maintaining balance. Inhale as you go down. Note: As in the other exercises, do not allow your knee to go forward beyond your toes as you come down, as this will put undue stress on the knee joint. Make sure that you keep your front shin perpendicular to the ground. Using mainly the heel of your foot, push up and go back to the starting position as you exhale. Repeat the movement for the recommended amount of repetitions and then perform with the left leg."},
    {"name":"Barbell Walking Lunge","muscle":"Legs","equip":"Barbell","img":"Barbell_Walking_Lunge.jpg","desc":"Begin standing with your feet shoulder width apart and a barbell across your upper back. Step forward with one leg, flexing the knees to drop your hips. Descend until your rear knee nearly touches the ground. Your posture should remain upright, and your front knee should stay above the front foot. Drive through the heel of your lead foot and extend both knees to raise yourself back up. Step forward with your rear foot, repeating the lunge on the opposite leg."},
    {"name":"Standing Calf Raises","muscle":"Legs","equip":"Machine","img":"Standing_Calf_Raises.jpg","desc":"Adjust the padded lever of the calf raise machine to fit your height. Place your shoulders under the pads provided and position your toes facing forward (or using any of the two other positions described at the beginning of the chapter). The balls of your feet should be secured on top of the calf block with the heels extending off it. Push the lever up by extending your hips and knees until your torso is standing erect. The knees should be kept with a slight bend; never locked. Toes should be facing forward, outwards or inwards as described at the beginning of the chapter. This will be your starting position. Raise your heels as you breathe out by extending your ankles as high as possible and flexing your calf. Ensure that the knee is kept stationary at all times. There should be no bending at any time. Hold the contracted position by a second before you start to go back down. Go back slowly to the starting position as you breathe in by lowering your heels as you bend the ankles until calves are stretched. Repeat for the recommended amount of repetitions."},
    {"name":"Seated Calf Raise","muscle":"Legs","equip":"Machine","img":"Seated_Calf_Raise.jpg","desc":"Sit on the machine and place your toes on the lower portion of the platform provided with the heels extending off. Choose the toe positioning of your choice (forward, in, or out) as per the beginning of this chapter. Place your lower thighs under the lever pad, which will need to be adjusted according to the height of your thighs. Now place your hands on top of the lever pad in order to prevent it from slipping forward. Lift the lever slightly by pushing your heels up and release the safety bar. This will be your starting position. Slowly lower your heels by bending at the ankles until the calves are fully stretched. Inhale as you perform this movement. Raise the heels by extending the ankles as high as possible as you contract the calves and breathe out. Hold the top contraction for a second. Repeat for the recommended amount of repetitions."},
    {"name":"Bodyweight Squat","muscle":"Legs","equip":"Bodyweight","img":"Bodyweight_Squat.jpg","desc":"Stand with your feet shoulder width apart. You can place your hands behind your head. This will be your starting position. Begin the movement by flexing your knees and hips, sitting back with your hips. Continue down to full depth if you are able,and quickly reverse the motion until you return to the starting position. As you squat, keep your head and chest up and push your knees out."},
    {"name":"Split Squat with Dumbbells","muscle":"Legs","equip":"Dumbbell","img":"Split_Squat_with_Dumbbells.jpg","desc":"Position yourself into a staggered stance with the rear foot elevated and front foot forward. Hold a dumbbell in each hand, letting them hang at the sides. This will be your starting position. Begin by descending, flexing your knee and hip to lower your body down. Maintain good posture througout the movement. Keep the front knee in line with the foot as you perform the exercise. At the bottom of the movement, drive through the heel to extend the knee and hip to return to the starting position."},
    {"name":"Balance Board","muscle":"Legs","equip":"Other","img":"Balance_Board.jpg","desc":"Place a balance board in front of you. Stand up on it and try to balance yourself. Hold the balance for as long as desired."},
    {"name":"Ball Leg Curl","muscle":"Legs","equip":"Exercise Ball","img":"Ball_Leg_Curl.jpg","desc":"Begin on the floor laying on your back with your feet on top of the ball. Position the ball so that when your legs are extended your ankles are on top of the ball. This will be your starting position. Raise your hips off of the ground, keeping your weight on the shoulder blades and your feet. Flex the knees, pulling the ball as close to you as you can, contracting the hamstrings. After a brief pause, return to the starting position."},
    {"name":"Band Hip Adductions","muscle":"Legs","equip":"Bands","img":"Band_Hip_Adductions.jpg","desc":"Anchor a band around a solid post or other object. Stand with your left side to the post, and put your right foot through the band, getting it around the ankle. Stand up straight and hold onto the post if needed. This will be your starting position. Keeping the knee straight, raise your right legs out to the side as far as you can. Return to the starting position and repeat for the desired rep count. Switch sides."},
    {"name":"Barbell Seated Calf Raise","muscle":"Legs","equip":"Barbell","img":"Barbell_Seated_Calf_Raise.jpg","desc":"Place a block about 12 inches in front of a flat bench. Sit on the bench and place the ball of your feet on the block. Have someone place a barbell over your upper thighs about 3 inches above your knees and hold it there. This will be your starting position. Raise up on your toes as high as possible as you squeeze the calves and as you breathe out. After a second contraction, slowly go back to the starting position. Tip: To get maximum benefit stretch your calves as far as you can. Repeat for the recommended amount of repetitions."},
    {"name":"Barbell Side Split Squat","muscle":"Legs","equip":"Barbell","img":"Barbell_Side_Split_Squat.jpg","desc":"Stand up straight while holding a barbell placed on the back of your shoulders (slightly below the neck). Your feet should be placed wide apart with the foot of the lead leg angled out to the side. This will be your starting position. Lower your body towards the side of your angled foot by bending the knee and hip of your lead leg and while keeping the opposite leg only slightly bent. Breathe in as you lower your body. Return to the starting position by extending the hip and knee of the lead leg. Breathe out as you perform this movement. After performing the recommended amount of reps, repeat the movement with the opposite leg."},
    {"name":"Bodyweight Walking Lunge","muscle":"Legs","equip":"Other","img":"Bodyweight_Walking_Lunge.jpg","desc":"Begin standing with your feet shoulder width apart and your hands on your hips. Step forward with one leg, flexing the knees to drop your hips. Descend until your rear knee nearly touches the ground. Your posture should remain upright, and your front knee should stay above the front foot. Drive through the heel of your lead foot and extend both knees to raise yourself back up. Step forward with your rear foot, repeating the lunge on the opposite leg."},
    {"name":"Standing Military Press","muscle":"Shoulders","equip":"Barbell","img":"Standing_Military_Press.jpg","desc":"Start by placing a barbell that is about chest high on a squat rack. Once you have selected the weights, grab the barbell using a pronated (palms facing forward) grip. Make sure to grip the bar wider than shoulder width apart from each other. Slightly bend the knees and place the barbell on your collar bone. Lift the barbell up keeping it lying on your chest. Take a step back and position your feet shoulder width apart from each other. Once you pick up the barbell with the correct grip length, lift the bar up over your head by locking your arms. Hold at about shoulder level and slightly in front of your head. This is your starting position. Lower the bar down to the collarbone slowly as you inhale. Lift the bar back up to the starting position as you exhale. Repeat for the recommended amount of repetitions."},
    {"name":"Arnold Dumbbell Press","muscle":"Shoulders","equip":"Dumbbell","img":"Arnold_Dumbbell_Press.jpg","desc":"Sit on an exercise bench with back support and hold two dumbbells in front of you at about upper chest level with your palms facing your body and your elbows bent. Tip: Your arms should be next to your torso. The starting position should look like the contracted portion of a dumbbell curl. Now to perform the movement, raise the dumbbells as you rotate the palms of your hands until they are facing forward. Continue lifting the dumbbells until your arms are extended above you in straight arm position. Breathe out as you perform this portion of the movement. After a second pause at the top, begin to lower the dumbbells to the original position by rotating the palms of your hands towards you. Tip: The left arm will be rotated in a counter clockwise manner while the right one will be rotated clockwise. Breathe in as you perform this portion of the movement. Repeat for the recommended amount of repetitions."},
    {"name":"Dumbbell Shoulder Press","muscle":"Shoulders","equip":"Dumbbell","img":"Dumbbell_Shoulder_Press.jpg","desc":"While holding a dumbbell in each hand, sit on a military press bench or utility bench that has back support. Place the dumbbells upright on top of your thighs. Now raise the dumbbells to shoulder height one at a time using your thighs to help propel them up into position. Make sure to rotate your wrists so that the palms of your hands are facing forward. This is your starting position. Now, exhale and push the dumbbells upward until they touch at the top. Then, after a brief pause at the top contracted position, slowly lower the weights back down to the starting position while inhaling. Repeat for the recommended amount of repetitions."},
    {"name":"Side Lateral Raise","muscle":"Shoulders","equip":"Dumbbell","img":"Side_Lateral_Raise.jpg","desc":"Pick a couple of dumbbells and stand with a straight torso and the dumbbells by your side at arms length with the palms of the hand facing you. This will be your starting position. While maintaining the torso in a stationary position (no swinging), lift the dumbbells to your side with a slight bend on the elbow and the hands slightly tilted forward as if pouring water in a glass. Continue to go up until you arms are parallel to the floor. Exhale as you execute this movement and pause for a second at the top. Lower the dumbbells back down slowly to the starting position as you inhale. Repeat for the recommended amount of repetitions."},
    {"name":"Front Dumbbell Raise","muscle":"Shoulders","equip":"Dumbbell","img":"Front_Dumbbell_Raise.jpg","desc":"Pick a couple of dumbbells and stand with a straight torso and the dumbbells on front of your thighs at arms length with the palms of the hand facing your thighs. This will be your starting position. While maintaining the torso stationary (no swinging), lift the left dumbbell to the front with a slight bend on the elbow and the palms of the hands always facing down. Continue to go up until you arm is slightly above parallel to the floor. Exhale as you execute this portion of the movement and pause for a second at the top. Inhale after the second pause. Now lower the dumbbell back down slowly to the starting position as you simultaneously lift the right dumbbell. Continue alternating in this fashion until all of the recommended amount of repetitions have been performed for each arm."},
    {"name":"Face Pull","muscle":"Shoulders","equip":"Cable","img":"Face_Pull.jpg","desc":"Facing a high pulley with a rope or dual handles attached, pull the weight directly towards your face, separating your hands as you do so. Keep your upper arms parallel to the ground."},
    {"name":"Reverse Flyes","muscle":"Shoulders","equip":"Dumbbell","img":"Reverse_Flyes.jpg","desc":"To begin, lie down on an incline bench with the chest and stomach pressing against the incline. Have the dumbbells in each hand with the palms facing each other (neutral grip). Extend the arms in front of you so that they are perpendicular to the angle of the bench. The legs should be stationary while applying pressure with the ball of your toes. This is the starting position. Maintaining the slight bend of the elbows, move the weights out and away from each other (to the side) in an arc motion while exhaling. Tip: Try to squeeze your shoulder blades together to get the best results from this exercise. The arms should be elevated until they are parallel to the floor. Feel the contraction and slowly lower the weights back down to the starting position while inhaling. Repeat for the recommended amount of repetitions."},
    {"name":"Barbell Rear Delt Row","muscle":"Shoulders","equip":"Barbell","img":"Barbell_Rear_Delt_Row.jpg","desc":"Stand up straight while holding a barbell using a wide (higher than shoulder width) and overhand (palms facing your body) grip. Bend knees slightly and bend over as you keep the natural arch of your back. Let the arms hang in front of you as they hold the bar. Once your torso is parallel to the floor, flare the elbows out and away from your body. Tip: Your torso and your arms should resemble the letter \"T\". Now you are ready to begin the exercise. While keeping the upper arms perpendicular to the torso, pull the barbell up towards your upper chest as you squeeze the rear delts and you breathe out. Tip: When performed correctly, this exercise should resemble a bench press in reverse. Also, refrain from using your biceps to do the work. Focus on targeting the rear delts; the arms should only act as hooks. Slowly go back to the initial position as you breathe in. Repeat for the recommended amount of repetitions."},
    {"name":"Standing Dumbbell Press","muscle":"Shoulders","equip":"Dumbbell","img":"Standing_Dumbbell_Press.jpg","desc":"Standing with your feet shoulder width apart, take a dumbbell in each hand. Raise the dumbbells to head height, the elbows out and about 90 degrees. This will be your starting position. Maintaining strict technique with no leg drive or leaning back, extend through the elbow to raise the weights together directly above your head. Pause, and slowly return the weight to the starting position."},
